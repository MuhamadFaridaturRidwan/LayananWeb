<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan - Sistem Inventori</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-blue-800 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <span class="font-bold text-xl tracking-wide">Inventori Barang PT. Rasyid Sejahtera</span>
            <ul class="flex space-x-6">
                <li><a href="dashboard.html" class="hover:text-blue-300 font-semibold">Dashboard</a></li>
                <li><a href="masuk.html" class="hover:text-blue-300 font-semibold">Barang Masuk</a></li>
                <li><a href="keluar.html" class="hover:text-blue-300 font-semibold">Barang Keluar</a></li>
                <li><a href="laporan.html" class="text-blue-300 font-bold border-b-2 border-blue-300 pb-1">Laporan</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4">
        
        <div class="bg-white rounded-lg shadow p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-l-4 border-indigo-500">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold mb-1">Mulai Tanggal</label>
                    <input type="date" class="border rounded p-2 text-sm w-full">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold mb-1">Sampai Tanggal</label>
                    <input type="date" class="border rounded p-2 text-sm w-full">
                </div>
                <div class="mt-5">
                    <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded text-sm transition duration-300">Filter Data</button>
                </div>
            </div>
            <div class="w-full md:w-auto mt-4 md:mt-0">
                <button class="w-full md:w-auto bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded text-sm flex items-center justify-center gap-2 transition duration-300">
                    <span>Cetak PDF / Excel</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="px-6 py-4 border-b">
                <h2 class="font-bold text-lg text-gray-800">Rekapitulasi Mutasi Barang</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">SKU</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama Barang</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Stok Awal</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Total Masuk</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Total Keluar</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Sisa Stok Akhir</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">SKU-001</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900">Laptop ThinkPad T14</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-gray-500">30</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-green-600 font-bold">+15</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-red-600 font-bold">0</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center font-bold text-blue-600">45</td>
                        </tr>
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">SKU-002</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900">Monitor Dell 24"</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-gray-500">7</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-green-600 font-bold">0</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-red-600 font-bold">-2</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center font-bold text-blue-600">5</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
