<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barang Keluar - Sistem Inventori</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-blue-800 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <span class="font-bold text-xl tracking-wide">Inventori Barang PT. Rasyid Sejahtera</span>
            <ul class="flex space-x-6">
                <li><a href="dashboard.html" class="hover:text-blue-300 font-semibold">Dashboard</a></li>
                <li><a href="masuk.html" class="hover:text-blue-300 font-semibold">Barang Masuk</a></li>
                <li><a href="keluar.html" class="text-blue-300 font-bold border-b-2 border-blue-300 pb-1">Barang Keluar</a></li>
                <li><a href="laporan.html" class="hover:text-blue-300 font-semibold">Laporan</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 bg-white rounded-lg shadow p-6 h-fit border-t-4 border-red-500">
            <h2 class="font-bold text-lg text-gray-800 mb-4 border-b pb-2">Catat Barang Keluar</h2>
            <form>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Pilih Barang (SKU)</label>
                    <select class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                        <option>SKU-001 - Laptop ThinkPad T14 (Stok: 45)</option>
                        <option>SKU-002 - Monitor Dell 24" (Stok: 5)</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Tanggal Keluar</label>
                    <input type="date" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Jumlah</label>
                    <input type="number" min="1" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Contoh: 2">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Tujuan / Digunakan Oleh</label>
                    <textarea class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" rows="3" placeholder="Contoh: Dipinjam Divisi Marketing"></textarea>
                </div>
                <button type="button" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-300">
                    Proses Pengeluaran
                </button>
            </form>
        </div>

        <div class="md:col-span-2 bg-white rounded-lg shadow overflow-hidden">
            <div class="px-6 py-4 border-b">
                <h2 class="font-bold text-lg text-gray-800">Riwayat Barang Keluar Terbaru</h2>
            </div>
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tanggal</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Barang</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Jumlah</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tujuan</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">16 Apr 2026</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-semibold">Monitor Dell 24"</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-red-600 font-bold">-2</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">Setup Meja Staff Baru</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
